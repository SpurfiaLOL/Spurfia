<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Account</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .back-btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .account-card {
            background-color: white;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .avatar-container {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .username {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin: 5px 0;
        }
        .status-text {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 20px;
        }
        .sign-in-btn {
            background-color: #007aff;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .sign-in-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html';">← Go Back</button>
    </div>

    <div class="account-card">
        <div class="avatar-container">👤</div>
        <div class="username">Guest User</div>
        <div class="status-text">You are browsing incognito. Sign in to enable download access for your Ladia tweaks.</div>
        <button class="sign-in-btn" onclick="alert('Sign in system coming soon!');">Sign In</button>
    </div>

</body>
</html>
